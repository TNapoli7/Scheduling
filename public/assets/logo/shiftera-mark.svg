<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Shiftera">
  <defs>
    <linearGradient id="shifteraCoral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A73"/>
      <stop offset="1" stop-color="#D85543"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square badge -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#shifteraCoral)"/>
  <!-- Binder tabs on top of the calendar -->
  <rect x="82" y="48" width="14" height="32" rx="7" fill="#FFFFFF"/>
  <rect x="160" y="48" width="14" height="32" rx="7" fill="#FFFFFF"/>
  <!-- Calendar body (outline) -->
  <rect x="52" y="72" width="152" height="140" rx="20" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Top header band divider -->
  <line x1="52" y1="110" x2="204" y2="110" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Clock face inside the calendar body -->
  <circle cx="128" cy="162" r="30" fill="none" stroke="#FFFFFF" stroke-width="9"/>
  <!-- Clock hands (hour up, minute right) -->
  <line x1="128" y1="162" x2="128" y2="144" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="162" x2="146" y2="162" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
</svg>
