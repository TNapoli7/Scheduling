<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Optimized for small sizes: simplified grid to 2x2 for clarity -->

  <!-- Calendar body -->
  <rect x="4" y="14" width="56" height="46" rx="6" ry="6" fill="#E8850A"/>

  <!-- Darker header bar -->
  <rect x="4" y="14" width="56" height="14" rx="6" ry="6" fill="#D47608"/>

  <!-- Divider line -->
  <rect x="4" y="24" width="56" height="1" fill="#D47608" opacity="0.4"/>

  <!-- Left pin -->
  <rect x="18" y="2" width="5" height="14" rx="2.5" ry="2.5" fill="#E8850A"/>

  <!-- Right pin -->
  <rect x="41" y="2" width="5" height="14" rx="2.5" ry="2.5" fill="#E8850A"/>

  <!-- 2x2 grid dots for better visibility at small sizes -->
  <circle cx="20" cy="36" r="2" fill="#FFF" opacity="0.95"/>
  <circle cx="44" cy="36" r="2" fill="#FFF" opacity="0.95"/>
  <circle cx="20" cy="52" r="2" fill="#FFF" opacity="0.95"/>
  <circle cx="44" cy="52" r="2" fill="#FFF" opacity="0.95"/>
</svg>